<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto | SinAgua</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">
    <header class="bg-white border-b border-slate-200">
        <div class="container mx-auto px-4 py-4 grid grid-cols-1 md:grid-cols-3 items-center gap-4">
            <!-- Izquierda: Logo -->
            <div class="flex items-center gap-3 justify-center md:justify-start">
                <img src="src/assets/logo2.png" alt="SinAgua Logo" class="h-10 w-auto">
                <h1 class="text-xl font-bold text-slate-900">SinAgua</h1>
            </div>
            
            <!-- Centro: Navegación -->
            <nav class="flex gap-4 text-sm font-medium text-slate-600 justify-center">
                <a href="index.html" class="hover:text-blue-600">Dashboard</a>
                <a href="nosotros.html" class="hover:text-blue-600">Quiénes Somos</a>
                <a href="contacto.html" class="text-blue-700 underline">Contacto</a>
                <a href="donacion.html" class="hover:text-blue-600">Apóyanos</a>
            </nav>

            <!-- Derecha: Status (o espaciador invisible) -->
            <div class="hidden md:flex justify-end">
                <!-- Solo se muestra en index.html, en las otras actúa como espaciador -->
                <div id="headerStatus" class="flex items-center gap-2 text-sm text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-200">
                    <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                    Actualizado: <span id="lastDate">--</span>
                </div>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-12 max-w-2xl">
        <h1 class="text-3xl font-bold mb-6 text-blue-900">Contacto</h1>
        <div class="bg-white p-8 rounded-xl shadow-sm border border-slate-200">
            <p class="text-slate-600 mb-6">¿Tienes comentarios, sugerencias o dudas sobre los datos? Estamos aquí para escucharte.</p>
            <div class="flex items-center gap-3 text-lg">
                <span class="font-semibold text-slate-900">Email:</span>
                <a href="mailto:r.astorga12@gmail.com" class="text-blue-600 font-semibold hover:underline">r.astorga12@gmail.com</a>
            </div>
        </div>
    </main>

    <script src="src/js/script.js"></script>
</body>
</html>
