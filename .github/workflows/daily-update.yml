name: Daily Data Update

on:
  schedule:
    - cron: '0 15 * * *' # Ejecuta todos los días a las 8:00 AM hora de Culiacán (UTC-7)
  workflow_dispatch: # Permite ejecución manual desde la pestaña Actions

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Browsers
        run: npx playwright install chromium

      - name: Run Data Pipeline
        run: |
          node scripts/descargar_pdf.js
          node scripts/extraer_texto_robusto.js
          node scripts/convertir_a_json_2026.js
          node scripts/aggregate_data.js

      - name: Commit and Push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Auto-update: Daily dam data" || echo "No changes to commit"
          git push
