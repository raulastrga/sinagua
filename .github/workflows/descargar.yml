name: Descargar Reporte Diario

on:
  schedule:
    # Se ejecuta todos los días a las 08:00 UTC
    - cron: '0 8 * * *'
  workflow_dispatch: # Permite ejecutarlo manualmente desde GitHub

jobs:
  descargar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Instalar Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Instalar dependencias
        run: npm install

      # Playwright necesita instalar navegadores
      - name: Instalar navegadores de Playwright
        run: npx playwright install chromium

      - name: Ejecutar script de descarga
        run: node descargar_pdf.js

      - name: Configurar git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Subir archivo descargado al repo
        run: |
          git add *.pdf
          # Verifica si hay cambios antes de hacer commit
          if git diff --staged --quiet; then
            echo "No hay nuevos archivos PDF para subir."
          else
            git commit -m "Descarga automática de reporte diario"
            git push
          fi